version: "3.8"

services:
  # Eros Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: eros:latest
    container_name: eros-app
    ports:
      - "9697:3000"
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET:-change-this-secret-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ./data:/data:rw
    networks:
      - eros-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "Promise.all([fetch('http://localhost:3000'),fetch('http://localhost:3001/health')]).then(()=>process.exit(0)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Jellyfin Media Server
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Istanbul}
      - JELLYFIN_PublishedServerUrl=http://your-ip:8096
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
    ports:
      - "8096:8096"
    networks:
      - eros-network
    restart: unless-stopped

  # qBittorrent
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Istanbul}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - ./qbittorrent/config:/config
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    networks:
      - eros-network
    restart: unless-stopped

  # Prowlarr
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Istanbul}
    volumes:
      - ./prowlarr/config:/config
    ports:
      - "9696:9696"
    networks:
      - eros-network
    restart: unless-stopped

  # FlareSolverr (optional - for cloudflare-protected sites)
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TZ=${TZ:-Europe/Istanbul}
    ports:
      - "8191:8191"
    networks:
      - eros-network
    restart: unless-stopped
    profiles:
      - flaresolverr

networks:
  eros-network:
    driver: bridge

# =============================================================================
# MEDIA PATHS - Add your media paths below
# =============================================================================
# To add media paths, uncomment and edit the volumes sections for each service.
# Your .env file is automatically read by docker compose.
#
# Example (.env):
#   MEDIA_PATH_1=/mnt/pve/DATA1000/media
#   MEDIA_PATH_2=/mnt/pve/SSD500/media
#
# Then uncomment volumes like:
#   volumes:
#     - ./data:/data:rw
#     - ${MEDIA_PATH_1}:${MEDIA_PATH_1}:rw
#     - ${MEDIA_PATH_2}:${MEDIA_PATH_2}:rw
# =============================================================================
